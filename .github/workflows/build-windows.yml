name: Build Windows EXE (PyInstaller)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --name TransparentPenOverlay overlay_draw.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TransparentPenOverlay-windows
          path: dist/TransparentPenOverlay.exe
